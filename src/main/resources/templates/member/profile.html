<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profil | RaceKatteKlubben</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <nav id="navbar">
        <div class="nav-header">
            <h1 id="company-name">RaceKatteKlubben</h1>
        </div>
        <div class="nav-links">
            <a class="nav-link" href="/home">Hjem</a>
            <a class="nav-link" href="/profile">Min Profil</a>
        </div>

        <a id="log-out-button" th:href="@{/logout}">Log ud</a>
    </nav>

    <h1>Hej <span th:text="${member.memberName}"></span>!</h1>

    <div class="actions">
        <a class="btn" th:href="@{/profile/{memberId}/cats(memberId=${member.id})}"><button type="button">Mine katte</button></a>
        <a class="btn" href="/profile/update"><button type="button">Opdater Profil</button></a>

        <form class="button" th:action="@{/members/delete/{id}(id =${member.id})}" method="post"
              onsubmit="return confirm('Er du sikker på at du vil slette din konto?')">
            <button class="btn btn-danger" type="submit">Slet konto</button>
        </form>
    </div>
</body>
</html>
