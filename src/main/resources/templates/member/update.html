<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update | RaceKatteKlubben</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <nav id="navbar">
        <div class="nav-header">
            <h1 id="company-name">RaceKatteKlubben</h1>
        </div>
        <div class="nav-links">
            <a class="nav-link" href="/home">Hjem</a>
            <a class="nav-link" href="/profile">Min Profil</a>
        </div>

        <a id="log-out-button" th:href="@{/logout}">Log ud</a>
    </nav>

    <h1> Opdater din profil</h1>

    <form class="update-member-form" th:object="${member}" method="post" th:action="@{/profile/update}">
        <input type="hidden" name="id" th:value="*{id}">
        <div class="input-field">
            <label for="name">Navn:</label>
            <input type="text" th:field="*{memberName}" id="name" placeholder="Intast navn...">
        </div>

        <div class="input-field">
            <label for="email">Email:</label>
            <input type="text" th:field="*{email}" id="email" placeholder="Intast email...">
        </div>

        <div class="input-field">
            <label for="oldPassword">Gamle Adgangskode:</label>
            <input type="password" name="oldPassword" id="oldPassword" placeholder="Intast gamle Adgangskode...">
        </div>
        <div class="input-field">
            <label for="password">Nye Adgangskode:</label>
            <input type="password" name="password" id="password" placeholder="Intast nye Adgangskode...">
        </div>
        <div class="input-field">
            <label for="confirmPassword">Gentag Adgangskode:</label>
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Gentag Adgangskode...">
        </div>

        <div class="form-actions">
            <a href="/profile"><button class="btn" type="button">Gå tilbage</button></a>
            <button class="btn" type="submit">Opdater</button>
        </div>

        <p th:if="${error}" th:text="${error}" style="color:red;"></p>
    </form>
</body>
</html>
